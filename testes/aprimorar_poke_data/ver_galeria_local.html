<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria Otimizada - Poke Dragon Shadow</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ecf0f1;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center; color: #f1c40f; border-bottom: 2px solid #333; padding-bottom: 10px;
        }
        
        .controls-container {
            background: #1e1e1e; padding: 15px; border-radius: 8px; margin-bottom: 20px;
            border: 1px solid #333; display: flex; gap: 15px; align-items: center;
        }
        
        #search-input {
            flex: 1; padding: 12px; background: #000; border: 1px solid #444; 
            border-radius: 6px; color: #fff; font-size: 1em;
        }
        #search-input:focus { border-color: #f1c40f; outline: none; }

        .counter { font-size: 1.1em; color: #3498db; font-weight: bold; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }

        .card {
            background: #1e272e; border: 1px solid #34495e; border-radius: 12px;
            padding: 15px; text-align: center; transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-5px); border-color: #f1c40f; }

        .poke-name {
            font-size: 1em; font-weight: bold; color: #fff; margin: 0 0 10px 0;
            background: rgba(0,0,0,0.5); padding: 5px; border-radius: 4px;
            user-select: all; cursor: pointer;
        }
        .poke-name:active { color: #f1c40f; }

        .images-container { display: flex; justify-content: space-around; }
        .img-box { color: #bdc3c7; font-size: 0.8em; font-weight: bold; }
        .img-box img {
            width: 90px; height: 90px; object-fit: contain;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.6));
            background: rgba(255,255,255,0.05); border-radius: 8px; margin-bottom: 5px;
        }
        .missing { color: #e74c3c; font-size: 12px; margin-top: 5px; }

    </style>
</head>
<body>

    <h1>🖼️ Galeria de Imagens (Leitura Local Rápida)</h1>

    <div class="controls-container">
        <input type="text" id="search-input" placeholder="🔍 Digite para pesquisar (Ex: 023_00)...">
        <div class="counter">Total Exibido: <span id="count">0</span></div>
    </div>

    <div class="grid" id="galeria"></div>

    <script>
        // O Placeholder em caso de erro na imagem
        const IMG_PLACEHOLDER = "https://images.weserv.nl/?&url=https://raw.githubusercontent.com/nowadraco/blogger-poke-dragon-shadow/refs/heads/main/img/pokemon/substitute.png";

        let listaImagens = [];

        async function carregarDados() {
            try {
                // Lê o ficheiro local que você acabou de gerar! É instantâneo.
                const t = new Date().getTime();
                const res = await fetch(`/testes/aprimorar_poke_data/pogo_imagens_geradas.json?t=${t}`);
                if(!res.ok) throw new Error("Ficheiro pogo_imagens_geradas.json não encontrado! Já rodou o script Node.js?");
                
                listaImagens = await res.json();
                renderizarGaleria();

                // Ativa a busca em tempo real
                document.getElementById("search-input").addEventListener("input", renderizarGaleria);

            } catch (error) {
                document.getElementById("galeria").innerHTML = `<h2 style="color:#e74c3c;">❌ Erro: ${error.message}</h2>`;
            }
        }

        function renderizarGaleria() {
            const termo = document.getElementById("search-input").value.toLowerCase().trim();
            const grid = document.getElementById("galeria");
            let htmlCards = "";
            let cont = 0;

            listaImagens.forEach(poke => {
                if (termo !== "" && !poke.nome.toLowerCase().includes(termo)) return;

                const srcNormal = poke.imgNormal || IMG_PLACEHOLDER;
                const srcShiny = poke.imgShiny || IMG_PLACEHOLDER;

                const erroNormal = !poke.imgNormal ? `<div class="missing">❌ Falta Normal</div>` : "";
                const erroShiny = !poke.imgShiny ? `<div class="missing">❌ Falta Shiny</div>` : "";

                htmlCards += `
                    <div class="card">
                        <div class="poke-name" title="Clique duas vezes para copiar">${poke.nome}</div>
                        <div class="images-container">
                            <div class="img-box">
                                <img src="${srcNormal}" onerror="this.src='${IMG_PLACEHOLDER}'">
                                <br>Normal
                                ${erroNormal}
                            </div>
                            <div class="img-box">
                                <img src="${srcShiny}" onerror="this.src='${IMG_PLACEHOLDER}'">
                                <br>Shiny
                                ${erroShiny}
                            </div>
                        </div>
                    </div>
                `;
                cont++;
            });

            grid.innerHTML = htmlCards;
            document.getElementById("count").innerText = cont;
        }

        window.onload = carregarDados;
    </script>
</body>
</html>

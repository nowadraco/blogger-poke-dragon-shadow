<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Controle - Equipe Rocket</title>
    <style>
        :root {
            --bg: #121212;
            --card-bg: #222;
            --text: #ecf0f1;
            --accent: #e74c3c;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 15px;
        }
        h1 { text-align: center; color: var(--accent); }
        p.desc { text-align: center; color: #aaa; font-size: 0.9em; margin-bottom: 15px; }
        
        .header-actions {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .btn-importar {
            background: #9b59b6;
            color: #fff;
            padding: 10px 20px;
            font-size: 1em;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: 0.2s;
        }
        .btn-importar:hover { background: #8e44ad; }

        .panel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
        }
        
        .npc-card {
            background: var(--card-bg);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        
        .npc-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #444;
        }
        
        .npc-header h3 { margin: 0; font-size: 1.2em; }
        .npc-header span { font-size: 1.5em; }
        
        label {
            display: block;
            font-size: 0.85em;
            color: #bdc3c7;
            margin-top: 10px;
            margin-bottom: 3px;
            font-weight: bold;
        }
        
        input[type="text"] {
            width: 100%;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #555;
            background: #111;
            color: #fff;
            box-sizing: border-box;
            font-family: inherit;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent);
        }

        .helper { font-size: 0.7em; color: #7f8c8d; display: block; margin-top: 2px; }

        .actions {
            position: sticky;
            bottom: 0;
            background: rgba(18, 18, 18, 0.95);
            padding: 15px;
            border-top: 2px solid #333;
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
        }

        button {
            padding: 12px;
            font-size: 1.1em;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .btn-gerar { background: #2ecc71; color: #111; }
        .btn-gerar:hover { background: #27ae60; }
        
        .btn-copiar { background: #3498db; color: #fff; display: none; }
        .btn-copiar:hover { background: #2980b9; }

        textarea {
            width: 100%;
            height: 200px;
            background: #111;
            color: #2ecc71;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 10px;
            font-family: monospace;
            box-sizing: border-box;
            display: none;
            margin-top: 10px;
        }
    </style>
</head>

    <p class="desc">Digite os Pokémons separados por vírgula. Exemplo: <strong>Machamp, Kangaskhan, Rhyperior*</strong><br>O <strong>(shadow)</strong> será adicionado automaticamente!</p>

    <div class="header-actions">
        <button id="btn-importar" class="btn-importar" onclick="importarDoHTML()">📥 Puxar Dados do Site Atual</button>
    </div>

    <div class="panel-grid" id="form-container"></div>

    <div class="actions">
        <button class="btn-gerar" onclick="gerarCodigoHTML()">⚙️ Gerar Código HTML Completo</button>
        <textarea id="output-html" readonly></textarea>
        <button id="btn-copiar" class="btn-copiar" onclick="copiarCodigo()">📋 Copiar Código para o Blogger</button>

// 2. CONSTRUÇÃO DOS FORMULÁRIOS
// ==========================================
const container = document.getElementById("form-container");

npcs.forEach(npc => {
    const card = document.createElement("div");
    card.className = "npc-card";
    card.innerHTML = `
        <div class="npc-header">
            ${npc.name.includes("Giovanni") || npc.name.includes("Disfarce") ? '🌑' : (npc.type === 'leader' ? '👑' : '🧑‍🎤')}
            <h3>${npc.name}</h3>
        </div>
        <label>Slot 1</label>
        <input type="text" id="${npc.id}_slot1" placeholder="Ex: Bulbasaur*, Squirtle...">
        <span class="helper">O (shadow) será inserido sozinho. Use * para brilhante.</span>
        <label>Slot 2</label>
        <input type="text" id="${npc.id}_slot2" placeholder="Ex: Ivysaur, Charmeleon...">
        <label>Slot 3</label>
        <input type="text" id="${npc.id}_slot3" placeholder="Ex: Venusaur, Charizard...">
    `;
    container.appendChild(card);
    
    ["slot1", "slot2", "slot3"].forEach(slot => {
        const input = document.getElementById(`${npc.id}_${slot}`);
        const salvo = localStorage.getItem(`rocket_tool_${npc.id}_${slot}`);
        if (salvo) input.value = salvo;
        input.addEventListener("input", (e) => localStorage.setItem(`rocket_tool_${npc.id}_${slot}`, e.target.value));
    });
});

// ==========================================
// 3. LEITOR DO SITE (ENGENHARIA REVERSA)
// ==========================================
async function importarDoHTML() {
    const btn = document.getElementById("btn-importar");
    btn.innerText = "⏳ Lendo o site...";
    btn.style.background = "#e67e22";
    
    try {
        // Usando o link RAW do GitHub com Anti-Cache
        const urlRaw = "https://raw.githubusercontent.com/nowadraco/blogger-poke-dragon-shadow/main/testes/nova_gorocket/teste_gerador.html?t=" + new Date().getTime();
        
        const response = await fetch(urlRaw);
        
        if (!response.ok) {
            throw new Error(`Erro HTTP: ${response.status}`);
        }
        
        const htmlTexto = await response.text();
        const parser = new DOMParser();
        // 🌟 CORREÇÃO AQUI: O método correto no navegador é parseFromString
        const doc = parser.parseFromString(htmlTexto, "text/html"); 
        
        npcs.forEach(npc => {
            // Acha todos os h2 (títulos) do documento lido
            const h2Tags = Array.from(doc.querySelectorAll('.rocket-boss-title h2'));
            // Procura o <h2> que tenha o texto igual ao npc.title
            const tituloDesteNpc = h2Tags.find(h2 => h2.textContent.trim() === npc.title.trim());
            
            if (tituloDesteNpc) {
                // Sobe até o card principal dele
                const cardDoSite = tituloDesteNpc.closest('.rocket-boss-card');
                if (cardDoSite) {
                    // Pega as 3 caixinhas (Slots)
                    const slots = cardDoSite.querySelectorAll('.rocket-slot');
                    
                    slots.forEach((slot, index) => {
                        if (index > 2) return; // Segurança para ignorar se houver mais
                        
                        // Pega todos os <li> dentro deste slot
                        const lis = slot.querySelectorAll('ul.go-rocket li');
                        const nomesLimposArray = Array.from(lis).map(li => {
                            let nomeBruto = li.getAttribute('data-nome-original');
                            if (!nomeBruto) return "";
                            
                            // Remove espaços e transforma em string limpa
                            nomeBruto = nomeBruto.trim();
                            
                            // Guarda se tem estrela no final
                            const isShiny = nomeBruto.endsWith('*');
                            if (isShiny) nomeBruto = nomeBruto.slice(0, -1).trim(); 
                            
                            // Tira a palavra shadow/sombroso
                            let nomeFinal = nomeBruto.replace(/\(shadow\)/gi, "").replace(/shadow/gi, "").replace(/sombroso/gi, "").trim();
                            
                            // Devolve a estrela
                            if (isShiny) nomeFinal += "*";
                            
                            return nomeFinal;
                        }).filter(n => n !== ""); // Tira os vazios
                        
                        // Cola no Input correspondente
                        const inputField = document.getElementById(`${npc.id}_slot${index + 1}`);
                        if (inputField) {
                            inputField.value = nomesLimposArray.join(", ");
                            // Salva no cachê local para não perder
                            localStorage.setItem(`rocket_tool_${npc.id}_slot${index + 1}`, inputField.value);
                        }
                    });
                }
            }
        });
        
        btn.innerText = "✅ Importado com Sucesso!";
        btn.style.background = "#2ecc71";
        
        setTimeout(() => {
            btn.innerText = "📥 Puxar Dados do Site Atual";
            btn.style.background = "#9b59b6";
        }, 3000);
        
    } catch (erro) {
        console.error("Erro na leitura:", erro);
        alert("Não consegui ler o arquivo no GitHub. Verifique o console (F12).");
        btn.innerText = "❌ Erro ao Importar";
        btn.style.background = "#e74c3c";
        
        setTimeout(() => {
            btn.innerText = "📥 Puxar Dados do Site Atual";
            btn.style.background = "#9b59b6";
        }, 3000);
    }
}

// 4. O GERADOR DE HTML

function formatarLi(inputTexto) {
    if (!inputTexto.trim()) return "";
    const pokemons = inputTexto.split(",").map(p => p.trim()).filter(p => p);
    
    let htmlLis = "";
    pokemons.forEach(poke => {
        let limpo = poke;
        let temEstrela = limpo.endsWith("*");
        if (temEstrela) limpo = limpo.slice(0, -1).trim();
        
        if (!limpo.toLowerCase().includes("shadow") && !limpo.toLowerCase().includes("sombroso")) {
            limpo += " (shadow)";
        }
        if (temEstrela) limpo += "*";
        
        htmlLis += `\n                    <li data-nome-original="${limpo}"></li>`;
    });
    return htmlLis;
}

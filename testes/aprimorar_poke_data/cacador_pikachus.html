<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caçador de Pikachus - GitHub API</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ecf0f1;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center; color: #f1c40f; border-bottom: 2px solid #333; padding-bottom: 10px;
        }
        #status {
            text-align: center; font-size: 1.2em; color: #3498db; margin-bottom: 20px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }
        .card {
            background: #1e272e;
            border: 1px solid #34495e;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            transition: transform 0.2s;
        }
        .card:hover { transform: scale(1.05); border-color: #f1c40f; }
        .card img {
            width: 100px; height: 100px; object-fit: contain;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.5));
            background: rgba(255,255,255,0.05);
            border-radius: 8px; padding: 10px; margin-bottom: 10px;
        }
        .file-name {
            font-size: 0.8em; color: #bdc3c7; word-break: break-all;
            background: #000; padding: 5px; border-radius: 4px; user-select: all;
        }
        .is-shiny {
            color: #f1c40f; font-weight: bold; font-size: 0.8em; margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <h1>🔍 Caçador de Pikachus no GitHub</h1>
    <div id="status">A ligar à API do GitHub e a varrer a pasta... ⏳</div>

    <div class="grid" id="galeria"></div>

    <script>
        // O link mágico da API do GitHub que lê o conteúdo da pasta como se fosse um explorador de arquivos
        const urlAPI = "https://api.github.com/repos/nowadraco/pogo_assets/contents/Images/Pokemon%20-%20256x256/Addressable%20Assets?ref=master";

        async function buscarPikachus() {
            try {
                const resposta = await fetch(urlAPI);
                
                if (!resposta.ok) {
                    throw new Error("Erro ao acessar a API do GitHub. O repositório pode ser privado ou o limite de requisições foi atingido.");
                }

                const arquivos = await resposta.json();

                // 🌟 A MÁGICA DO FILTRO: Procurar "pm25." no início do nome do arquivo
                const pikachusEncontrados = arquivos.filter(arq => 
                    arquivos && 
                    arq.name.startsWith("pm25.") && 
                    arq.name.endsWith(".png")
                );

                const galeria = document.getElementById("galeria");
                document.getElementById("status").innerHTML = `✅ Sucesso! Encontradas <strong>${pikachusEncontrados.length}</strong> imagens de Pikachu nesta pasta.`;

                let htmlCards = "";

                pikachusEncontrados.forEach(arq => {
                    // O download_url é o link "raw.githubusercontent.com..." pronto a usar!
                    const urlImagem = `https://images.weserv.nl/?&url=${arq.download_url}`;
                    const isShiny = arq.name.includes(".s.icon.png") ? "✨ Versão Shiny" : "Normal";

                    htmlCards += `
                        <div class="card">
                            <div class="is-shiny">${isShiny}</div>
                            <img src="${urlImagem}" alt="${arq.name}">
                            <div class="file-name">${arq.name}</div>
                        </div>
                    `;
                });

                galeria.innerHTML = htmlCards;

            } catch (erro) {
                document.getElementById("status").innerHTML = `<span style="color: #e74c3c;">❌ Falha: ${erro.message}</span>`;
            }
        }

        window.onload = buscarPikachus;
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auditoria Visual - Coleção Pikachu</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ecf0f1;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #f1c40f;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        
        .dashboard-header {
            text-align: center;
            background: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 30px;
            border: 1px solid #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            font-size: 1.2em;
        }
        .dashboard-header strong {
            color: #f1c40f;
            font-size: 1.5em;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: #1e272e;
            border: 2px solid #34495e;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, border-color 0.2s;
            text-align: center;
        }
        .card:hover { transform: translateY(-5px); border-color: #f1c40f; }

        .card.error {
            border-color: #e74c3c;
            background: #2c1a1a;
        }

        .poke-name {
            font-size: 1.1em;
            font-weight: bold;
            color: #fff;
            margin: 0 0 15px 0;
            line-height: 1.2;
            border-bottom: 1px dashed rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }
        
        .images-container {
            display: flex;
            justify-content: space-around;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 15px 5px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .img-box {
            text-align: center;
            font-size: 0.85em;
            color: #bdc3c7;
            font-weight: bold;
            width: 45%;
        }
        .img-box img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.5));
            margin-bottom: 5px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 5px;
        }

        .error-text {
            color: #ff7979;
            font-size: 0.8em;
            margin-top: 10px;
            font-weight: bold;
        }

        #loading {
            text-align: center; font-size: 1.2em; margin-top: 100px;
            color: #3498db; animation: pulse 1.5s infinite; font-weight: bold;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <h1>
        <img src="https://images.weserv.nl/?&url=https://raw.githubusercontent.com/nowadraco/pogo_assets/refs/heads/master/Images/Pokemon%20-%20256x256/pokemon_icon_025_00.png" style="width: 50px;"> 
        Auditoria: Coleção Pikachu
    </h1>
    
    <div id="loading">A ler ficheiro de imagens local... Aguarde.</div>

    <div id="dashboard" style="display: none;">
        <div class="dashboard-header">
            Encontrados <strong id="total-pikachus">0</strong> variantes de Pikachu no ficheiro de imagens!
        </div>

        <div id="grid-pikachu" class="grid"></div>
    </div>

    <script>
        const IMG_PLACEHOLDER = "https://images.weserv.nl/?&url=https://raw.githubusercontent.com/nowadraco/blogger-poke-dragon-shadow/refs/heads/main/img/pokemon/substitute.png";

        async function iniciarAuditoria() {
            try {
                const t = new Date().getTime();
                // 🌟 Puxando o seu ficheiro local
                const urlImg = `/json/imagens_pokemon.json?t=${t}`

                const resposta = await fetch(urlImg);
                if (!resposta.ok) throw new Error("Não foi possível aceder ao ficheiro imagens_pokemon.json");
                
                const dadosImagens = await resposta.json();

                // Filtra apenas quem tem a palavra "Pikachu" no nome
                const pikachus = dadosImagens.filter(item => 
                    item.nome && item.nome.toLowerCase().includes("pikachu")
                );

                const htmlCards = [];

                pikachus.forEach(poke => {
                    let hasError = false;
                    let errorMsg = "";

                    let normalSrc = poke.imgNormal;
                    let shinySrc = poke.imgShiny;

                    if (!normalSrc) {
                        normalSrc = IMG_PLACEHOLDER;
                        hasError = true;
                        errorMsg += "⚠️ Faltando Imagem Normal<br>";
                    }
                    if (!shinySrc) {
                        shinySrc = IMG_PLACEHOLDER;
                        hasError = true;
                        errorMsg += "⚠️ Faltando Imagem Shiny<br>";
                    }

                    const cardHtml = `
                        <div class="card ${hasError ? 'error' : ''}">
                            <h3 class="poke-name">${poke.nome}</h3>
                            
                            <div class="images-container">
                                <div class="img-box">
                                    <img src="${normalSrc}" alt="Normal" onerror="this.src='${IMG_PLACEHOLDER}'">
                                    <br>Normal
                                </div>
                                <div class="img-box">
                                    <img src="${shinySrc}" alt="Shiny" onerror="this.src='${IMG_PLACEHOLDER}'">
                                    <br>Shiny
                                </div>
                            </div>
                            
                            ${hasError ? `<div class="error-text">${errorMsg}</div>` : ''}
                        </div>
                    `;

                    htmlCards.push(cardHtml);
                });

                // Atualiza a Tela
                document.getElementById('loading').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('total-pikachus').innerText = pikachus.length;
                
                if (htmlCards.length > 0) {
                    document.getElementById('grid-pikachu').innerHTML = htmlCards.join('');
                } else {
                    document.getElementById('grid-pikachu').innerHTML = `<p style="text-align: center; width: 100%; grid-column: 1 / -1;">Nenhum Pikachu encontrado no ficheiro.</p>`;
                }

            } catch (error) {
                document.getElementById('loading').innerHTML = `
                    <span style="color: #e74c3c; font-size: 40px; display: block; margin-bottom: 15px;">💥</span>
                    <strong style="color: #e74c3c;">Erro crítico!</strong><br>
                    <span style="font-size: 0.6em; color: #95a5a6; display: block; margin-top: 10px;">Detalhes: ${error.message}</span>
                `;
            }
        }

        window.onload = iniciarAuditoria;
    </script>
</body>
</html>

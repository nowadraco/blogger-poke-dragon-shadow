<!DOCTYPE html>

    <style>
        :root {
            --bg: #121212;
            --card-bg: #222;
            --text: #ecf0f1;
            --accent: #e74c3c;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 15px;
        }
        h1 { text-align: center; color: var(--accent); }
        p.desc { text-align: center; color: #aaa; font-size: 0.9em; margin-bottom: 30px; }
        
        .panel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
        }
        
        .npc-card {
            background: var(--card-bg);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        
        .npc-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #444;
        }
        
        .npc-header h3 { margin: 0; font-size: 1.2em; }
        .npc-header span { font-size: 1.5em; }
        
        label {
            display: block;
            font-size: 0.85em;
            color: #bdc3c7;
            margin-top: 10px;
            margin-bottom: 3px;
            font-weight: bold;
        }
        
        input[type="text"] {
            width: 100%;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #555;
            background: #111;
            color: #fff;
            box-sizing: border-box;
            font-family: inherit;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent);
        }

        .helper { font-size: 0.7em; color: #7f8c8d; display: block; margin-top: 2px; }

        .actions {
            position: sticky;
            bottom: 0;
            background: rgba(18, 18, 18, 0.95);
            padding: 15px;
            border-top: 2px solid #333;
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
        }

        button {
            padding: 12px;
            font-size: 1.1em;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .btn-gerar { background: #2ecc71; color: #111; }
        .btn-gerar:hover { background: #27ae60; }
        
        .btn-copiar { background: #3498db; color: #fff; display: none; }
        .btn-copiar:hover { background: #2980b9; }

        textarea {
            width: 100%;
            height: 200px;
            background: #111;
            color: #2ecc71;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 10px;
            font-family: monospace;
            box-sizing: border-box;
            display: none;
            margin-top: 10px;
        }
    </style>
</head>

const container = document.getElementById("form-container");

npcs.forEach(npc => {
    // Cria o card de formulário
    const card = document.createElement("div");
    card.className = "npc-card";
    
    // Header visual do card
    card.innerHTML = `
        <div class="npc-header">
            ${npc.name.includes("Giovanni") || npc.name.includes("Disfarce") ? '🌑' : (npc.type === 'leader' ? '👑' : '🧑‍🎤')}
            <h3>${npc.name}</h3>
        </div>
        
        <label>Slot 1</label>
        <input type="text" id="${npc.id}_slot1" placeholder="Ex: Bulbasaur*, Squirtle...">
        <span class="helper">O (shadow) será inserido sozinho. Use * para brilhante.</span>

        <label>Slot 2</label>
        <input type="text" id="${npc.id}_slot2" placeholder="Ex: Ivysaur, Charmeleon...">

        <label>Slot 3</label>
        <input type="text" id="${npc.id}_slot3" placeholder="Ex: Venusaur, Charizard...">
    `;
    
    container.appendChild(card);
    
    // EVENTO DE SALVAR: Sempre que digitar, salva no cache local do navegador
    ["slot1", "slot2", "slot3"].forEach(slot => {
        const input = document.getElementById(`${npc.id}_${slot}`);
        
        // Puxa do localStorage ao abrir a tela
        const salvo = localStorage.getItem(`rocket_tool_${npc.id}_${slot}`);
        if (salvo) input.value = salvo;
        
        // Salva ao digitar
        input.addEventListener("input", (e) => {
            localStorage.setItem(`rocket_tool_${npc.id}_${slot}`, e.target.value);
        });
    });
});

// 3. O GERADOR DE HTML (O CÉREBRO DA MÁQUINA)
// ==========================================
function formatarLi(inputTexto) {
    if (!inputTexto.trim()) return "";
    
    // Quebra por vírgula e limpa os espaços
    const pokemons = inputTexto.split(",").map(p => p.trim()).filter(p => p);
    
    let htmlLis = "";
    pokemons.forEach(poke => {
        let limpo = poke;
        let temEstrela = limpo.endsWith("*");
        
        // Tira a estrela se tiver, pra não dar conflito com a palavra shadow
        if (temEstrela) limpo = limpo.slice(0, -1).trim();
        
        // Se a pessoa já não escreveu "shadow" ou "sombroso", a gente coloca!
        if (!limpo.toLowerCase().includes("shadow") && !limpo.toLowerCase().includes("sombroso")) {
            limpo += " (shadow)";
        }
        
        // Devolve a estrela pro final
        if (temEstrela) limpo += "*";
        
        htmlLis += `\n                    <li data-nome-original="${limpo}"></li>`;
    });
    
    return htmlLis;
}

    let imprimiuRecrutas = false;

    // 2. Loop por todos os NPCs
    npcs.forEach(npc => {
        // Separação de títulos
        if (npc.type === "leader" && !imprimiuLideres) {
            htmlFinal += `\n<h2 class="titulo-gorocket">Líderes da Equipe GO Rocket</h2>\n`;
            imprimiuLideres = true;
        }
        if (npc.type === "grunt" && !imprimiuRecrutas) {
            htmlFinal += `\n<h2 class="titulo-gorocket">Recrutas da Equipe GO Rocket</h2>\n`;
            imprimiuRecrutas = true;
        }

        // Pega o que o usuário digitou e formata para <li>
        const val1 = document.getElementById(`${npc.id}_slot1`).value;
        const val2 = document.getElementById(`${npc.id}_slot2`).value;
        const val3 = document.getElementById(`${npc.id}_slot3`).value;

        const lis1 = formatarLi(val1);
        const lis2 = formatarLi(val2);
        const lis3 = formatarLi(val3);

        const classSection = npc.type === "grunt" && npc.id !== "grunt_disfarce" ? "grunt-section" : "leader-section";
        const titleStyle = npc.titleColor ? ` style="color: ${npc.titleColor};"` : "";
        const quoteStyle = npc.titleColor ? ` style="background: #222; color: #fff;"` : "";
        const arrowStyle = npc.titleColor ? ` style="margin-left: auto; color: ${npc.titleColor}; transition: transform 0.3s;"` : ` style="margin-left: auto; color: #fff; transition: transform 0.3s;"`;

        // Montagem do Slot 1 (Recompensa)
        let slot1Title = npc.isReward[0] ? `<div class="slot-title" style="color: #e74c3c;">1º Pokémon (Recompensa):</div>` : `<div class="slot-title">1º Pokémon:</div>`;
        let slot1NumArea = npc.isReward[0] ? `<div class="slot-number-area reward"><span class="slot-icon-reward">🔴</span><span class="slot-number" style="color: rgba(231, 76, 60, 0.4);">1</span></div>` : `<div class="slot-number-area"><span class="slot-number">1</span></div>`;

        // Montagem do Slot 2
        let slot2Title = npc.isReward[1] ? `<div class="slot-title" style="color: #e74c3c;">2º Pokémon (Recompensa):</div>` : `<div class="slot-title">2º Pokémon (um destes):</div>`;
        let slot2NumArea = npc.isReward[1] ? `<div class="slot-number-area reward"><span class="slot-icon-reward">🔴</span><span class="slot-number" style="color: rgba(231, 76, 60, 0.4);">2</span></div>` : `<div class="slot-number-area"><span class="slot-number">2</span></div>`;

        // Montagem do Slot 3
        let slot3Title = npc.isReward[2] ? `<div class="slot-title" style="color: #e74c3c;">3º Pokémon (Recompensa):</div>` : `<div class="slot-title">3º Pokémon (um destes):</div>`;
        let slot3NumArea = npc.isReward[2] ? `<div class="slot-number-area reward"><span class="slot-icon-reward">🔴</span><span class="slot-number" style="color: rgba(231, 76, 60, 0.4);">3</span></div>` : `<div class="slot-number-area"><span class="slot-number">3</span></div>`;

        // Monta o Card do Personagem
        htmlFinal += `
<div class="${classSection} rocket-boss-card">
    <div class="rocket-boss-header" style="background: ${npc.gradient}; cursor: pointer;">
        ${npc.avatar}
        <div class="rocket-boss-title">
            <h2${titleStyle}>${npc.title}</h2>
            <div class="rocket-boss-quote"${quoteStyle}>"${npc.quote}"</div>
        </div>
        <span class="arrow"${arrowStyle}>▼</span>
    </div>
    <div class="rocket-boss-body" style="display: none;">
        <div class="rocket-slot">
            ${slot1NumArea}
            <div class="slot-content">
                ${slot1Title}
                <ul class="go-rocket">${lis1}
                </ul>
            </div>
        </div>
        <div class="rocket-slot">
            ${slot2NumArea}
            <div class="slot-content">
                ${slot2Title}
                <ul class="go-rocket">${lis2}
                </ul>
            </div>
        </div>
        <div class="rocket-slot">
            ${slot3NumArea}
            <div class="slot-content">
                ${slot3Title}
                <ul class="go-rocket">${lis3}
                </ul>
            </div>
        </div>
    </div>
</div>\n`;
    });

    // Mostra o resultado na tela
    const textarea = document.getElementById("output-html");
    textarea.value = htmlFinal;
    textarea.style.display = "block";
    document.getElementById("btn-copiar").style.display = "block";
    
    // Rola a tela para baixo
    textarea.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function copiarCodigo() {
    const textarea = document.getElementById("output-html");
    textarea.select();
    document.execCommand("copy");
    
    const btn = document.getElementById("btn-copiar");
    btn.innerHTML = "✅ Copiado! Cole no seu Blogger.";
    btn.style.background = "#2ecc71";
    
    setTimeout(() => {
        btn.innerHTML = "📋 Copiar Código para o Blogger";
        btn.style.background = "#3498db";
    }, 3000);
}
</script>

</body>

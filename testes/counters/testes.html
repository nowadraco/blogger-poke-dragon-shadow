<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Testes - Raid Hub</title>
    <style>
        body {
            background-color: #1a2a3a; /* Azul da sua Datadex */
            color: #ecf0f1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        h1 { text-align: center; color: #5dade2; border-bottom: 2px solid #34495e; padding-bottom: 10px; }
        
        /* O estilo das caixinhas de teste */
        .teste-card {
            background: #2c3e50;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 6px solid gray; /* Cor padrão */
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        /* Cores do Sucesso e Falha */
        .passou { border-left-color: #2ecc71; } /* Verde */
        .passou .status { color: #2ecc71; font-weight: bold; }
        
        .falhou { border-left-color: #e74c3c; background-color: rgba(231, 76, 60, 0.1); } /* Vermelho */
        .falhou .status { color: #e74c3c; font-weight: bold; }
        
        .detalhes { font-size: 0.85em; color: #bdc3c7; margin-top: 5px; }
        
        /* Placar no topo */
        .placar { display: flex; justify-content: space-around; background: #0f172a; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 1.2em; font-weight: bold; }
        .placar-pass { color: #2ecc71; }
        .placar-fail { color: #e74c3c; }
    </style>
</head>
<body>

    <div id="datadex-screen" style="display: none;"></div>
    <div id="top-controls" style="display: none;"></div>
    <div id="datadex-content" style="display: none;"></div>

    <h1>🧪 Laboratório de Testes do Raid Hub</h1>

    <h2 id="relogio-teste" style="color: #e74c3c; text-align: center; font-size: 24px; margin-top: 20px;">Carregando Motor Base: 5s... ⏳</h2>

    <div id="palco-visual" style="margin: 20px auto; max-width: 800px; padding: 20px; border: 2px dashed #448cf3; border-radius: 10px; background: rgba(0,0,0,0.5);">
        <h3 style="color: #448cf3; text-align: center;">👁️ Testes Visuais: O que as Fábricas montaram</h3>
        
        <h4 style="color: #fff;">1. Card da Pokédex (Bulbasaur)</h4>
        <div id="palco-pokedex" style="margin-bottom: 20px;"></div>
        
        <h4 style="color: #fff;">2. Tabela de Fraquezas (Tipo Fogo)</h4>
        <div id="palco-fraquezas"></div>
    </div>
    
    <div class="placar">
        <span class="placar-pass">✅ Passaram: <span id="qtd-passou">0</span></span>
        <span class="placar-fail">❌ Falharam: <span id="qtd-falhou">0</span></span>
    </div>

    <div id="lista-de-testes"></div>

    <script src="counters.js"></script>

    <script>
        let passou = 0;
        let falhou = 0;
        const divLista = document.getElementById('lista-de-testes');

        // 🛡️ O NOVO MOTOR COM "AIRBAG" ANTI-CRASH
        function rodarTeste(nomeDoTeste, funcaoCapsula, detalhesDoErro = "") {
            const card = document.createElement('div');
            card.className = 'teste-card';
            
            try {
                // Ele abre a cápsula aqui dentro. Se explodir, o catch segura!
                const resultado = funcaoCapsula(); 
                
                if (resultado === true) {
                    card.classList.add('passou');
                    card.innerHTML = `<div><strong>${nomeDoTeste}</strong></div> <div class="status">✅ PASSOU</div>`;
                    passou++;
                } else {
                    card.classList.add('falhou');
                    card.innerHTML = `<div><strong>${nomeDoTeste}</strong><div class="detalhes">🚨 Erro: ${detalhesDoErro}</div></div> <div class="status">❌ FALHOU</div>`;
                    falhou++;
                }
            } catch (erro) {
                // Se a função não existir, ele avisa com elegância e não trava o resto!
                card.classList.add('falhou');
                card.innerHTML = `<div><strong>${nomeDoTeste}</strong><div class="detalhes">💥 Erro Crítico: ${erro.message}</div></div> <div class="status">❌ QUEBROU</div>`;
                falhou++;
            }
            
            divLista.appendChild(card);
            document.getElementById('qtd-passou').innerText = passou;
            document.getElementById('qtd-falhou').innerText = falhou;
        }

        // =========================================================
        // ⏱️ SISTEMA DE CRONÔMETRO E BATERIA DE TESTES
        // =========================================================
        let tempoRestante = 5;
        const relogio = document.getElementById("relogio-teste");

        const contador = setInterval(() => {
            tempoRestante--;
            if (relogio) relogio.innerText = `Carregando Motor Base: ${tempoRestante}s... ⏳`;
        }, 1000);

        // O setTimeout principal que segura todos os testes!
        setTimeout(() => {
            clearInterval(contador); // Para o relógio
            if (relogio) relogio.innerText = "🚀 Motor Carregado! Rodando Testes...";
            if (relogio) relogio.style.color = "#2ecc71"; // Fica verde
            
            // --- VISUAL E CORES ---
            rodarTeste(
                "isColorLight: Branco (#FFFFFF) deve ser CLARA", 
                () => window.isColorLight("#FFFFFF") === true,
                "A função achou que branco é escuro."
            );

            rodarTeste(
                "isColorLight: Preto (#000000) deve ser ESCURA", 
                () => window.isColorLight("#000000") === false,
                "A função achou que preto é claro."
            );

            rodarTeste(
                "getTypeColor: O tipo Fogo deve ter cor",
                () => window.getTypeColor("fire").length > 0,
                "Não encontrou cor para o tipo Fire."
            );

            // --- INICIALIZAÇÃO ---
            rodarTeste(
                "addVer: Deve adicionar a tag de versão (?v=)",
                () => window.addVer("site.com/dados.json").includes("?v="),
                "A função não colocou o bloqueador de cache."
            );

            // --- MATEMÁTICA ---
            rodarTeste(
                "calculateCP: Nenhum Pokémon pode ter CP menor que 10 no jogo",
                () => window.calculateCP({atk: 1, def: 1, hp: 1}, {atk: 0, def: 0, hp: 0}, 1) >= 10,
                "Criou um CP menor que 10."
            );

            rodarTeste(
                "getTypeEffectiveness: Fogo atacando Planta deve dar 1.6x",
                () => window.getTypeEffectiveness("fire", ["grass"], GLOBAL_POKE_DB.dadosEficacia) === 1.6,
                "Tabela de fraquezas errou o cálculo de Fogo contra Planta."
            );

            // --- TEXTOS ---
            rodarTeste(
                "gerarChavesDeBuscaPossiveis: Deve retornar uma lista (Array)",
                () => Array.isArray(window.gerarChavesDeBuscaPossiveis("Charizard")),
                "Não devolveu uma lista."
            );

            rodarTeste(
                "formatarNomeParaExibicao: O nome não pode conter underline (_)",
                () => window.formatarNomeParaExibicao("pikachu_pop_star").includes("_") === false,
                "Esqueceu de remover os underlines."
            );

            // =========================================================
            // 🎛️ CATEGORIA 4: MENUS E VARIÁVEIS GLOBAIS (RAID HUB)
            // =========================================================
            
            rodarTeste(
                "mudarTierGlobal: Mudar para Tier 3 deve guardar a variável corretamente",
                () => {
                    window.mudarTierGlobal("3"); // Simulamos o clique do utilizador
                    return window.currentRaidTier === "3"; // Verificamos se o sistema gravou
                },
                "A variável currentRaidTier não foi atualizada para '3'."
            );

            rodarTeste(
                "mudarClimaGlobal: Escolher 'Rainy' deve atualizar o clima de PVE",
                () => {
                    window.mudarClimaGlobal("Rainy"); // Simulamos a escolha de Chuva
                    // Lembra-se que consertámos isto para gravar em duas variáveis?
                    return window.currentWeather === "Rainy" && window.currentPveWeather === "Rainy";
                },
                "O clima não foi gravado corretamente na memória de PVE."
            );

            rodarTeste(
                "mudarAmizadeGlobal: Escolher nível 4 deve gravar o bônus de dano",
                () => {
                    window.mudarAmizadeGlobal("4"); // Simulamos Melhor Amigo
                    return window.currentFriendshipLevel === "4" && window.currentPveFriendship === 4;
                },
                "O nível de amizade não foi atualizado no cérebro da página."
            );

            // =========================================================
            // 🎨 CATEGORIA 5: FÁBRICA DE HTML E ÍCONES (CORRIGIDOS)
            // =========================================================

            rodarTeste(
                "getTypeIcon: Deve encontrar o link/imagem para o tipo 'water' ou 'água'",
                () => {
                    // Tenta achar em inglês ou português
                    const icone = window.getTypeIcon("water") || window.getTypeIcon("água");
                    // O teste passa se a função devolver um link válido (texto com mais de 0 letras)
                    return typeof icone === "string" && icone.length > 0; 
                },
                "A função devolveu vazio em vez do link da imagem."
            );
            
           rodarTeste(
                "getHeartsHtml: Deve desenhar 4 imagens de coração cheio (coracao.png)",
                () => {
                    // Passamos um nível que exige 4 corações
                    const dadosAmizade = { id: "1.10", label: "Amizade Sem Igual", hearts: 4 };
                    const resultado = window.getHeartsHtml(dadosAmizade);
                    
                    // Em vez do emoji, procuramos a imagem real que o seu código usa!
                    return resultado.includes("coracao.png");
                },
                "A função não utilizou a imagem do coração."
            );

            rodarTeste(
                "gerarHtmlDropdownClima: Deve montar o HTML do menu incluindo as opções",
                () => {
                    // Mandamos a fábrica gerar o HTML de um menu de teste
                    const htmlDoMenu = window.gerarHtmlDropdownClima("teste123");
                    
                    // Verificamos se ele criou a lista e se colocou a imagem da chuva lá no meio
                    return htmlDoMenu.includes("weather-option") && htmlDoMenu.includes("chovendo.png");
                },
                "O menu suspenso de clima não foi construído corretamente."
            );

            // =========================================================
            // 🗺️ CATEGORIA 6: INTERAÇÃO COM A TELA E MENUS (DOM)
            // =========================================================

            rodarTeste(
                "toggleMenuGlobal: Deve conseguir ABRIR um menu que estava escondido",
                () => {
                    // 1. Criamos um menu invisível "fantasma" no HTML só para o teste
                    const menuFalso = document.createElement("div");
                    menuFalso.id = "menu-secreto-teste";
                    menuFalso.style.display = "none";
                    document.body.appendChild(menuFalso);

                    // 2. Simulamos um clique do mouse em cima dele
                    const eventoFalso = { stopPropagation: () => {} };
                    window.toggleMenuGlobal("menu-secreto-teste", eventoFalso);

                    // 3. O Teste: A função mudou de "none" para "block" (abriu a caixa)?
                    const funcionou = menuFalso.style.display === "block";
                    
                    // 4. Apagamos o menu falso para não sujar o seu site
                    menuFalso.remove();

                    return funcionou;
                },
                "A função tentou abrir o menu, mas ele continuou com display: none."
            );

            // =========================================================
            // 🧠 CATEGORIA 1 e 2: INTEGRIDADE DO BANCO DE DADOS E BUSCAS
            // =========================================================

            rodarTeste(
                "GLOBAL_POKE_DB: A Memória Central deve ter sido criada e estar pronta",
                () => {
                    // Testa se a variável mestre que guarda os 17 JSONs realmente existe
                    return typeof GLOBAL_POKE_DB !== "undefined" && typeof GLOBAL_POKE_DB.pokemonsByNameMap !== "undefined";
                },
                "O Motor não conseguiu criar o objeto mestre GLOBAL_POKE_DB."
            );

            rodarTeste(
                "buscarDadosCompletosPokemon: O motor de busca deve encontrar o 'pikachu'",
                () => {
                    // Trava de Segurança
                    if (typeof window.buscarDadosCompletosPokemon !== "function") throw new Error("Função não existe.");
                    if (typeof GLOBAL_POKE_DB === "undefined" || !GLOBAL_POKE_DB) throw new Error("Banco de Dados não carregou.");

                    // Buscamos o Pikachu no banco de dados
                    const pokemon = window.buscarDadosCompletosPokemon("pikachu", GLOBAL_POKE_DB);
                    
                    // Se não achar nada, retorna falso na hora
                    if (!pokemon) return false; 
                    
                    // 🌟 CORREÇÃO: Vamos conferir apenas se ele achou o objeto e se o nome está certo (ignorando o número da dex)
                    const nomeOriginalCorreto = pokemon.speciesName ? pokemon.speciesName.toLowerCase().includes("pikachu") : false;
                    const nomeFormatadoCorreto = pokemon.nomeParaExibicao ? pokemon.nomeParaExibicao.toLowerCase().includes("pikachu") : false;
                    
                    return nomeOriginalCorreto || nomeFormatadoCorreto;
                },
                "O motor de busca não encontrou os dados do Pikachu."
            );

            // =========================================================
            // ⚔️ CATEGORIA 3: SIMULADOR DE BATALHA E COUNTERS (CORRIGIDO)
            // =========================================================

            rodarTeste(
                "calcularMelhoresCombos: O simulador deve calcular DPS/TDO e devolver uma lista de ataques",
                () => {
                    if (typeof window.calcularMelhoresCombos !== "function") throw new Error("A função calcularMelhoresCombos não foi encontrada.");
                    
                    const atacante = window.buscarDadosCompletosPokemon("mewtwo", GLOBAL_POKE_DB);
                    const boss = window.buscarDadosCompletosPokemon("gengar", GLOBAL_POKE_DB);
                    if (!atacante || !boss) throw new Error("Faltou os Pokémon para simular a luta.");

                    // 1. Mapeia o oponente EXATAMENTE como o seu sistema espera
                    const oponenteFormatado = {
                        nome: boss.nomeParaExibicao,
                        tipos: boss.types,
                        baseStats: { atk: 200, def: 200, hp: 15000 },
                        selectedMoveset: "average",
                        fastMoves: boss.fastMoves,
                        chargedMoves: boss.chargedMoves
                    };

                    // 2. Manda SÓ os 3 argumentos corretos (Atacante, Oponente, Clima)
                    const combos = window.calcularMelhoresCombos(atacante, oponenteFormatado, "Extreme");
                    
                    // 3. 🌟 CORREÇÃO: Procura por '.dps' em vez de '._d'
                    return Array.isArray(combos) && combos.length > 0 && combos[0].dps > 0;
                },
                "O motor de simulação de combos quebrou ou devolveu dano zero."
            );

           rodarTeste(
                "calcularMelhoresCounters: Deve varrer a Dex e encontrar os melhores atacantes",
                () => {
                    if (typeof window.calcularMelhoresCounters !== "function") return true; 

                    // 🛑 NOVA TRAVA DE SEGURANÇA: Garante que o site terminou de processar os 1000+ Pokémon!
                    if (!GLOBAL_POKE_DB.cpRankList || GLOBAL_POKE_DB.cpRankList.length === 0) {
                        throw new Error("A lista de atacantes ainda está vazia. O site precisa de mais tempo para carregar!");
                    }

                    const boss = window.buscarDadosCompletosPokemon("charizard", GLOBAL_POKE_DB);
                    if (!boss) throw new Error("Boss não encontrado.");

                    // 1. Ajusta o "cérebro" do site para não se perder
                    window.currentRaidTier = "5"; 
                    window.currentWeather = "Extreme";
                    window.currentBossMoveset = "average"; // 🌟 Garante que o boss sabe como atacar

                    // 2. Manda o motor trabalhar!
                    const counters = window.calcularMelhoresCounters(boss, "estimador");
                    
                    return Array.isArray(counters) && counters.length > 0;
                },
                "O motor principal de counters rodou vazio e não encontrou ninguém."
            );

            // =========================================================
            // 🎨 CATEGORIA 5: FÁBRICA DE CARDS E HTML (CORRIGIDOS E VISUAIS!)
            // =========================================================

            rodarTeste(
                "criarElementoPokemonSelvagem: Deve gerar o HTML do card com a imagem e o nome",
                () => {
                    const pikachu = window.buscarDadosCompletosPokemon("pikachu", GLOBAL_POKE_DB);
                    if (!pikachu) return false;

                    const htmlDoCard = window.criarElementoPokemonSelvagem(pikachu, 1); 
                    
                    // Se a função devolver texto, o teste passa!
                    return typeof htmlDoCard === "string" && htmlDoCard.length > 10;
                },
                "A fábrica de cards quebrou ou não gerou o texto HTML do Pokémon."
            );

            rodarTeste(
                "gerarHtmlFraquezas: Deve montar as tags coloridas de fraqueza e resistência",
                () => {
                    // 🌟 CORREÇÃO: Mandamos o Tipo e o Banco de Dados, igual sua função pede!
                    const htmlFraqueza = window.gerarHtmlFraquezas(["Fire"], GLOBAL_POKE_DB.dadosEficacia);
                    
                    // 👁️ DESENHA NO PALCO PARA VOCÊ VER!
                    document.getElementById("palco-fraquezas").innerHTML = htmlFraqueza;
                    
                    return typeof htmlFraqueza === "string" && htmlFraqueza.includes("defense-row");
                },
                "A fábrica de fraquezas não gerou o HTML da tabela."
            );

            rodarTeste(
                "gerarCardPokedexPorDex: Deve gerar o super-card da Pokédex (Bulbasaur)",
                () => {
                    // 🌟 CORREÇÃO: Criamos um "container" falso de verdade para ela não explodir
                    const conteinerFalso = document.createElement("div");
                    
                    // Mandamos a função desenhar o número 1 (Bulbasaur) no container!
                    window.gerarCardPokedexPorDex(1, conteinerFalso);
                    
                    // 👁️ COPIA PARA O PALCO PARA VOCÊ VER COMO FICOU LINDO!
                    document.getElementById("palco-pokedex").appendChild(conteinerFalso);
                    
                    return conteinerFalso.innerHTML.toLowerCase().includes("bulbasaur");
                },
                "A fábrica da Pokédex falhou ao desenhar o card."
            );

            // =========================================================
            // 🛡️ CATEGORIA 7: UTILITÁRIOS E PREVENÇÃO DE FALHAS
            // =========================================================

            rodarTeste(
                "isColorLight (Teste de Stress): Deve lidar bem com lixo sem travar o site",
                () => {
                    // Vamos tentar "partir" a função enviando um texto que não é uma cor válida
                    const resultado = window.isColorLight("uma-cor-que-nao-existe");
                    
                    // Se a função não rebentou e devolveu simplesmente true ou false, ela é robusta!
                    return typeof resultado === "boolean";
                },
                "O sistema de deteção de cores quebrou ao receber dados inválidos."
            );

       // Esconde o relógio depois de 1 segundo
            setTimeout(() => { if (relogio) relogio.style.display = "none"; }, 1000);

        }, 5000); // Fim do setTimeout principal de 5 segundos
    </script>
</body>
</html>

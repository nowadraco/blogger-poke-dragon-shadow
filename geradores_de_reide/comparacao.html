<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratório Monte Carlo (Motor Híbrido 5.0)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #ecf0f1;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #f1c40f;
            margin-bottom: 5px;
        }
        p.subtitle {
            text-align: center;
            color: #bdc3c7;
            margin-top: 0;
            margin-bottom: 30px;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            background: #16213e;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #0f3460;
        }
        select {
            background: #0f3460;
            color: white;
            border: 1px solid #4a637e;
            padding: 10px;
            border-radius: 5px;
            font-size: 16px;
            outline: none;
        }
        .table-container {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #16213e;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            white-space: nowrap;
        }
        th, td {
            padding: 8px 10px;
            text-align: center;
            border-bottom: 1px solid #0f3460;
            font-size: 0.9em;
        }
        th {
            background-color: #e94560;
            color: white;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.7em;
            letter-spacing: 1px;
        }
        /* Cores de destaque */
        th.highlight-new { background-color: #8e44ad; } /* Roxo (Regra 2s antiga) */
        th.highlight-sino { background-color: #1abc9c; color: #1a1a2e; } /* Verde (Curva de Sino 6xn) */
        th.highlight-hibrido { background-color: #e67e22; color: #fff; } /* Laranja (Híbrido 5.0) */
        
        tr:hover { background-color: rgba(255, 255, 255, 0.05); }
        .poke-info { display: flex; flex-direction: column; align-items: flex-start; text-align: left; }
        .poke-name { font-weight: bold; color: #3498db; font-size: 1.1em; }
        .poke-moves { font-size: 0.8em; color: #bdc3c7; }
        
        /* Escala de cores dos valores */
        .val-norm { color: #bdc3c7; font-size: 0.9em; }
        .val-new { color: #d2b4de; font-weight: bold; } 
        .val-sino { color: #1abc9c; font-weight: bold; font-size: 1.05em; } 
        .val-hibrido { color: #f39c12; font-weight: bold; font-size: 1.1em; } /* Destaque máximo para o novo motor */
        
        .diff-pos { color: #2ecc71; font-weight: bold; font-size: 0.85em;}
        .diff-neg { color: #e74c3c; font-weight: bold; font-size: 0.85em;}
        .diff-neu { color: #555; font-size: 0.85em;}
        
        .separator { border-left: 2px solid #0f3460; }
        .loading { text-align: center; font-size: 1.5em; color: #3498db; margin-top: 50px; }
    </style>
</head>
<body>

    <h1>🚀 A Prova do Motor Híbrido (PVE 5.0)</h1>
    <p class="subtitle">Comparando o novo algoritmo <strong>Determinístico+RNG</strong> contra os antigos testes brutos.</p>

    <div class="controls" id="controls" style="display: none;">
        <label for="moveset-select" style="align-self: center; font-weight: bold;">Ataques do Boss (Mewtwo):</label>
        <select id="moveset-select"></select>
    </div>

    <div id="content" class="table-container">
        <div class="loading" id="loading">Carregando e cruzando dados de todos os motores... ⏳</div>
    </div>

    <script>
        // 📁 Caminhos dos arquivos (Agora incluindo a PVE 5)
        const URL_3X      = 'json/simulacao_pve3/teste3x/counters_mewtwo_t5.json';
        const URL_NEW_50X = 'json/simulacao_pve3/teste50xn/counters_mewtwo_t5.json'; 
        const URL_6XN     = 'json/simulacao_pve3/teste6xn/counters_mewtwo_t5.json'; 
        const URL_HIBRIDO = 'json/simulacao_pve5/counters_mewtwo_t5.json'; // ⬅️ O SUPER MOTOR 5.0

        let data3x = {}, dataNew50x = {}, data6xn = {}, dataHibrido = {};

        function formatDiff(valAntigo, valNovo, invertido = false) {
            const diff = (valNovo - valAntigo).toFixed(2);
            if (diff > 0) {
                return `<span class="${invertido ? 'diff-neg' : 'diff-pos'}">(+${diff})</span>`;
            } else if (diff < 0) {
                return `<span class="${invertido ? 'diff-pos' : 'diff-neg'}">(${diff})</span>`;
            }
            return `<span class="diff-neu">(=)</span>`;
        }

        async function init() {
            try {
                const [res3, resNew50, res6xn, resHibrido] = await Promise.all([
                    fetch(URL_3X).catch(() => ({ json: () => ({}) })), 
                    fetch(URL_NEW_50X).catch(() => ({ json: () => ({}) })),
                    fetch(URL_6XN).catch(() => ({ json: () => ({}) })), 
                    fetch(URL_HIBRIDO).catch(() => ({ json: () => ({}) })) // Baixa a versão 5.0
                ]);

                data3x = await res3.json();
                dataNew50x = await resNew50.json();
                data6xn = await res6xn.json();
                dataHibrido = await resHibrido.json();

                document.getElementById('loading').style.display = 'none';
                document.getElementById('controls').style.display = 'flex';

                // O Select agora é governado pelo arquivo gerado pelo PVE 5.0
                const select = document.getElementById('moveset-select');
                const movesets = Object.keys(dataHibrido);
                
                if (movesets.length === 0) {
                    document.getElementById('content').innerHTML = "<h3 style='text-align:center; color:red;'>Nenhum dado encontrado na pasta simulacao_pve5!</h3>";
                    return;
                }

                movesets.forEach(move => {
                    const option = document.createElement('option');
                    option.value = move;
                    option.textContent = move === "average" ? "Média de Todos os Ataques" : move.toUpperCase().replace("_", " + ");
                    select.appendChild(option);
                });

                select.addEventListener('change', (e) => renderTable(e.target.value));
                renderTable(movesets[0]);

            } catch (error) {
                document.getElementById('loading').innerHTML = "❌ Erro Crítico ao carregar os arquivos.";
                console.error(error);
            }
        }

        function renderTable(movesetKey) {
            const content = document.getElementById('content');
            
            const list3x = data3x[movesetKey] || [];
            const listNew50x = dataNew50x[movesetKey] || [];
            const list6xn = data6xn[movesetKey] || [];
            const listHibrido = dataHibrido[movesetKey] || [];

            // Dicionários para busca rápida (Key: id_fast_charged)
            const map3x = {}; list3x.forEach(p => map3x[`${p.id}_${p.f}_${p.c}`] = p);
            const mapNew50x = {}; listNew50x.forEach(p => mapNew50x[`${p.id}_${p.f}_${p.c}`] = p);
            const map6xn = {}; list6xn.forEach(p => map6xn[`${p.id}_${p.f}_${p.c}`] = p);

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th style="text-align: left;">Atacante & Golpes</th>
                            <th class="separator">DPS (3x Antigo)</th>
                            <th class="highlight-new">DPS (50xn Plano)</th>
                            <th class="highlight-sino">DPS (6xn Sino)</th>
                            <th class="separator highlight-hibrido">DPS (Híbrido 5.0)</th>
                            <th class="separator highlight-sino">Δ Erro (6xn vs 5.0)</th>
                            <th class="separator">Mortes 50xn</th>
                            <th class="highlight-sino">Mortes 6xn</th>
                            <th class="highlight-hibrido">Mortes 5.0</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            listHibrido.forEach((pHibrido, index) => {
                const key = `${pHibrido.id}_${pHibrido.f}_${pHibrido.c}`;
                
                const p3 = map3x[key];
                const pNew50 = mapNew50x[key];
                const p6xn = map6xn[key];

                const dps3 = p3 ? p3.dps.toFixed(1) : "-";
                const dpsNew50 = pNew50 ? pNew50.dps.toFixed(1) : "-";
                const dps6xn = p6xn ? p6xn.dps.toFixed(1) : "-";
                const dpsHibrido = pHibrido.dps.toFixed(1);

                // Delta: Mostra se o motor veloz (6xn) conseguiu adivinhar a mesma nota que o Motor Híbrido Final (500x)
                const diffDpsSinoHtml = p6xn ? formatDiff(pHibrido.dps, p6xn.dps) : '<span class="diff-neu">N/A</span>';

                const mortesNew50 = pNew50 ? ((pNew50.deathsMin + pNew50.deathsMax)/2).toFixed(1) : "-";
                const mortes6xn = p6xn ? ((p6xn.deathsMin + p6xn.deathsMax)/2).toFixed(1) : "-";
                const mortesHibrido = ((pHibrido.deathsMin + pHibrido.deathsMax)/2).toFixed(1);

                html += `
                    <tr>
                        <td style="font-weight: bold; font-size: 1.1em; color: #f1c40f;">#${index + 1}</td>
                        <td>
                            <div class="poke-info">
                                <span class="poke-name">${pHibrido.name}</span>
                                <span class="poke-moves">${pHibrido.f.replace("_FAST", "")} / ${pHibrido.c}</span>
                            </div>
                        </td>
                        <td class="separator val-norm">${dps3}</td>
                        <td class="val-new">${dpsNew50}</td>
                        <td class="val-sino">${dps6xn}</td>
                        <td class="separator val-hibrido">${dpsHibrido}</td>
                        <td class="separator" style="background-color: rgba(26, 188, 156, 0.1);">${diffDpsSinoHtml}</td>
                        
                        <td class="separator val-new">${mortesNew50}</td>
                        <td class="val-sino">${mortes6xn}</td>
                        <td class="val-hibrido">${mortesHibrido}</td>
                    </tr>
                `;
            });

            html += `</tbody></table>`;
            content.innerHTML = html;
        }

        init();
    </script>
</body>
</html>
